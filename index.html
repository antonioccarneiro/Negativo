<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Negativações Bancárias</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d0f12;--sur:#141720;--card:#1b1f2b;--bdr:#252a38;--acc:#e8a020;--red:#c0392b;--txt:#d8dce8;--mut:#5a6070;--grn:#2ecc71;--mono:'IBM Plex Mono',monospace}
body{background:var(--bg);color:var(--txt);font-family:var(--mono);min-height:100vh;padding:2rem 1rem 4rem}
.sh{max-width:720px;margin:0 auto}
.hdr{border-bottom:1px solid var(--bdr);padding-bottom:1.2rem;margin-bottom:1.8rem}
.htag{font-size:.6rem;letter-spacing:.18em;color:var(--acc);text-transform:uppercase;margin-bottom:.4rem}
h1{font-size:1.4rem;font-weight:600;color:#fff}
.sub{font-size:.75rem;color:var(--mut);margin-top:.3rem}
.card{background:var(--card);border:1px solid var(--bdr);border-radius:8px;padding:1.3rem 1.4rem;margin-bottom:1.1rem}
.cl{font-size:.58rem;letter-spacing:.2em;color:var(--mut);text-transform:uppercase;margin-bottom:.9rem}
.entry{background:var(--sur);border:1px solid var(--bdr);border-radius:7px;padding:.85rem 1rem;margin-bottom:.6rem}
.entry-top{display:flex;align-items:center;gap:.6rem}
.dot{width:7px;height:7px;border-radius:50%;background:var(--red);flex-shrink:0;box-shadow:0 0 6px var(--red)}
.bname{font-size:.88rem;flex:1;font-weight:600;color:var(--txt)}
.brem{background:none;border:none;cursor:pointer;color:var(--mut);font-size:.85rem;padding:0 .2rem}
.entry-dates{display:flex;gap:1rem;flex-wrap:wrap;margin-top:.75rem;padding-top:.75rem;border-top:1px solid var(--bdr);align-items:flex-end}
.df{display:flex;flex-direction:column;gap:.3rem}
.dl{font-size:.55rem;letter-spacing:.18em;color:var(--mut);text-transform:uppercase}
input[type=date]{background:var(--bg);border:1px solid var(--bdr);border-radius:5px;color:var(--txt);font-family:var(--mono);font-size:.78rem;padding:.38rem .65rem;outline:none;color-scheme:dark}
.res{display:flex;flex-direction:column;gap:.15rem}
.res-date{font-size:1.05rem;font-weight:600;color:var(--grn)}
.res-day{font-size:.65rem;color:var(--acc)}
.res-note{font-size:.62rem;color:var(--mut);margin-top:.1rem}
.sep{height:1px;background:var(--bdr);margin:.9rem 0}
.ar{display:flex;gap:.5rem}
.it{flex:1;background:var(--bg);border:1px solid var(--bdr);border-radius:6px;color:var(--txt);font-family:var(--mono);font-size:.8rem;padding:.48rem .75rem;outline:none}
.it::placeholder{color:var(--mut)}
.btn{background:var(--acc);border:none;border-radius:6px;color:#000;cursor:pointer;font-family:var(--mono);font-size:.72rem;font-weight:600;padding:.48rem .9rem;white-space:nowrap}
.empty{font-size:.78rem;color:var(--mut);text-align:center;padding:.7rem 0}
.ft{text-align:center;margin-top:1.75rem;font-size:.52rem;color:var(--mut);letter-spacing:.1em}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect}=React;

function gE(y){
  const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,
        f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),
        h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,
        l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),
        mo=Math.floor((h+l-7*m+114)/31),day=((h+l-7*m+114)%31)+1;
  return new Date(y,mo-1,day);
}
const aD=(d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x};
const tK=d=>`${d.getMonth()+1}-${d.getDate()}`;
const bH=y=>{
  const e=gE(y);
  return new Set(["1-1","4-21","5-1","9-7","10-12","11-2","11-15","11-20","12-25",
    tK(aD(e,-48)),tK(aD(e,-47)),tK(aD(e,-2)),tK(aD(e,60))]);
};
const isBiz=d=>{const w=d.getDay();return w!==0&&w!==6&&!bH(d.getFullYear()).has(tK(d))};
function prevBiz(d){let x=new Date(d);x.setDate(x.getDate()-1);while(!isBiz(x))x.setDate(x.getDate()-1);return x}
const pL=s=>{if(!s)return null;const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d)};
const WD=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];
const MN=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const fm=d=>String(d.getDate()).padStart(2,"0")+"/"+String(d.getMonth()+1).padStart(2,"0")+"/"+d.getFullYear();
const fmL=d=>`${WD[d.getDay()]}, ${d.getDate()} ${MN[d.getMonth()]}. ${d.getFullYear()}`;

function calcPrazo(startStr){
  if(!startStr) return null;
  const s=pL(startStr);
  const raw=aD(s,9);
  const fin=isBiz(raw)?raw:prevBiz(raw);
  const adj=raw.getTime()!==fin.getTime();
  const w=raw.getDay();
  return{raw,fin,adj,reason:adj?(w===0?"Domingo":w===6?"Sábado":"Feriado"):""}
}

function App(){
  const[entries,setE]=useState(()=>{
    try{return JSON.parse(localStorage.getItem("neg2")||"[]")}catch{return[]}
  });
  const[nb,sNb]=useState("");

  useEffect(()=>{localStorage.setItem("neg2",JSON.stringify(entries))},[entries]);

  const add=()=>{
    const n=nb.trim();
    if(!n) return;
    setE(p=>[...p,{id:Date.now(),name:n,start:""}]);
    sNb("");
  };
  const remove=id=>setE(p=>p.filter(e=>e.id!==id));
  const setDate=(id,val)=>setE(p=>p.map(e=>e.id===id?{...e,start:val}:e));

  return(
    <div className="sh">
      <div className="hdr">
        <div className="htag">// controle financeiro</div>
        <h1>Negativações Bancárias</h1>
        <p className="sub">D+10 corridos (dia inicial incluso) · correção para dia útil anterior · feriados nacionais BR</p>
      </div>

      <div className="card">
        <div className="cl">// bancos negativados</div>

        {entries.length===0
          ? <div className="empty">Nenhum banco adicionado.</div>
          : entries.map(e=>{
              const p=calcPrazo(e.start);
              return(
                <div key={e.id} className="entry">
                  <div className="entry-top">
                    <span className="dot"/>
                    <span className="bname">{e.name}</span>
                    <button className="brem" onClick={()=>remove(e.id)}>✕</button>
                  </div>
                  <div className="entry-dates">
                    <div className="df">
                      <span className="dl">Início da negativação</span>
                      <input type="date" value={e.start} onChange={v=>setDate(e.id,v.target.value)}/>
                    </div>
                    {p&&(
                      <div className="res">
                        <span className="dl">Prazo D+10</span>
                        <span className="res-date">{fm(p.fin)}</span>
                        <span className="res-day">{fmL(p.fin)}</span>
                        {p.adj
                          ? <span className="res-note">⚠ {p.reason} → recuado de {fm(p.raw)}</span>
                          : <span className="res-note" style={{color:"var(--grn)"}}>✓ dia útil</span>
                        }
                      </div>
                    )}
                  </div>
                </div>
              );
            })
        }

        <div className="sep"/>
        <div className="ar">
          <input className="it" placeholder="Nome do banco..."
            value={nb} onChange={e=>sNb(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&add()}/>
          <button className="btn" onClick={add}>+ Adicionar</button>
        </div>
      </div>

      <div className="ft">FERIADOS NACIONAIS · CARNAVAL · CORPUS CHRISTI · SEXTA-FEIRA SANTA</div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
